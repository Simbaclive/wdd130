<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<title>Rapid Current Rafting Co. logo</title>
<desc>A circular emblem with a stylized river wave, a paddle crossing it, and the company name Rapid Current Rafting Co. beneath, on a transparent background.</desc>
<defs>
<clipPath id="circleClip"><circle cx="150" cy="150" r="95"/></clipPath>
</defs>

<circle cx="150" cy="150" r="98" fill="none" stroke="#eaf6f6" stroke-width="4"/>
<circle cx="150" cy="150" r="88" fill="#eaf6f6"/>

<g clip-path="url(#circleClip)">
<path d="M 55 190 Q 100 160 150 190 T 245 190 L 245 245 L 55 245 Z" fill="#1a7a8c"/>
<path d="M 55 175 Q 100 145 150 175 T 245 175 L 245 200 Q 200 170 150 200 Q 100 170 55 200 Z" fill="#0f5c6b"/>
<path d="M 55 205 Q 100 235 150 205 T 245 205 L 245 250 L 55 250 Z" fill="#0a4552"/>
</g>

<g transform="translate(150,120) rotate(-35)">
<rect x="-4" y="-58" width="8" height="90" rx="4" fill="#8a5a2c"/>
<ellipse cx="0" cy="-70" rx="16" ry="26" fill="#c97a3a"/>
<ellipse cx="0" cy="-70" rx="10" ry="18" fill="#e0985a"/>
</g>

<text x="150" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0a4552" font-weight="700">RAPID CURRENT</text>

<text x="340" y="140" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" font-weight="700">Rapid Current</text>
<text x="340" y="175" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" font-weight="700">Rafting Co.</text>
<text x="340" y="205" font-family="Arial, sans-serif" font-size="14" fill="#eaf6f6">Chase the current. Own the rapids.</text>
</svg>
